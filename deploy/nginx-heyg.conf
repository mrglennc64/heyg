# nginx vhost for heyg.usesmpt.com — proxies to the avatarforge containers.
# Install:  cp deploy/nginx-heyg.conf /etc/nginx/sites-available/heyg.conf
#           ln -s /etc/nginx/sites-available/heyg.conf /etc/nginx/sites-enabled/
#           nginx -t && systemctl reload nginx
#           certbot --nginx -d heyg.usesmpt.com   (adds the TLS block)
server {
    listen 80;
    listen [::]:80;
    server_name heyg.usesmpt.com;

    client_max_body_size 300M;   # avatar/voice uploads

    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location /docs { proxy_pass http://127.0.0.1:8100; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://127.0.0.1:8100; proxy_set_header Host $host; }
    location /healthz { proxy_pass http://127.0.0.1:8100; proxy_set_header Host $host; }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

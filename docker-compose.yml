name: avatarforge

x-gpu-worker: &gpu-worker
  restart: unless-stopped
  runtime: nvidia
  env_file: .env
  networks: [forge]
  depends_on:
    redis: { condition: service_healthy }
    minio: { condition: service_healthy }
  volumes:
    - ./data/models:/models:ro
    - ./data/cache:/cache
    - forge-scratch:/scratch

services:
  # ────────────────────────── control plane ──────────────────────────
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://forge:${POSTGRES_PASSWORD}@postgres:5432/forge
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [forge]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build: ./web
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on: [gateway]
    networks: [forge]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: forge
    volumes:
      - forge-pg:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [forge]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction
    networks: [forge]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - forge-minio:/data
    networks: [forge]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────── GPU workers ──────────────────────────
  voice-worker:
    <<: *gpu-worker
    build:
      context: .
      dockerfile: services/voice/Dockerfile
    command: celery -A worker.tasks worker -Q voice -n voice@%h
      --concurrency=${VOICE_CONCURRENCY:-2} --prefetch-multiplier=1
    environment:
      NVIDIA_VISIBLE_DEVICES: "0"
      XTTS_MODEL_DIR: /models/xtts_v2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  avatar-worker:
    <<: *gpu-worker
    build:
      context: .
      dockerfile: services/avatar/Dockerfile
    command: celery -A worker.tasks worker -Q avatar -n avatar@%h
      --concurrency=1 --prefetch-multiplier=1
    environment:
      NVIDIA_VISIBLE_DEVICES: "1"
      LIVEPORTRAIT_DIR: /models/liveportrait
      SADTALKER_DIR: /models/sadtalker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  lipsync-worker:
    <<: *gpu-worker
    build:
      context: .
      dockerfile: services/lipsync/Dockerfile
    command: celery -A worker.tasks worker -Q lipsync -n lipsync@%h
      --concurrency=1 --prefetch-multiplier=1
    environment:
      NVIDIA_VISIBLE_DEVICES: "1"
      MUSETALK_DIR: /models/musetalk
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  compositor-worker:
    <<: *gpu-worker
    build:
      context: .
      dockerfile: services/compositor/Dockerfile
    command: celery -A worker.tasks worker -Q compositor -n compositor@%h
      --concurrency=${COMPOSITOR_CONCURRENCY:-2} --prefetch-multiplier=1
    environment:
      # NVENC only — negligible VRAM; shares GPU 0 with voice
      NVIDIA_VISIBLE_DEVICES: "0"
      FFMPEG_HWACCEL: ${FFMPEG_HWACCEL:-nvenc}   # set to "cpu" for libx264
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu, video]

  flower:
    image: mher/flower:2.0
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports: ["5555:5555"]
    depends_on: [redis]
    networks: [forge]

networks:
  forge:

volumes:
  forge-pg:
  forge-minio:
  forge-scratch:   # shared NVMe scratch for inter-stage frame handoff
